<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GREJEM-OS HUB — centralny pulpit nawigacyjny ekosystemu GREJEM.">
  <meta name="color-scheme" content="dark light">
  <title>GREJEM-OS HUB</title>
  <link rel="icon" type="image/svg+xml" href="assets/grejem-os-logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap">
  <link rel="stylesheet" href="css/hub.css">
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>

  <header class="topbar glass" data-tauri-drag-region>
    <div class="brand">
      <img src="assets/grejem-os-logo.svg" alt="Logo GREJEM OS" class="brand-logo" draggable="false">
      <div class="brand-text">
        <h1>GREJEM-OS HUB</h1>
        <p class="brand-sub">Centrum sterowania ekosystemem GREJEM</p>
      </div>
    </div>
    <div class="topbar-right">
      <div class="clock" id="clock" aria-label="Aktualny czas">--:--:--</div>
      <button class="icon-btn" id="theme-toggle" type="button" aria-label="Przełącz motyw">
        <i data-lucide="moon"></i>
      </button>
      <button class="icon-btn win-btn" id="win-minimize" type="button" aria-label="Minimalizuj" title="Minimalizuj">
        <i data-lucide="minus"></i>
      </button>
      <button class="icon-btn win-btn win-close" id="win-close" type="button" aria-label="Zminimalizuj do zasobnika" title="Zminimalizuj do zasobnika">
        <i data-lucide="x"></i>
      </button>
    </div>
  </header>

  <div class="search-wrap">
    <i data-lucide="search" class="search-icon" aria-hidden="true"></i>
    <input type="search" id="search" class="search-input"
           placeholder="Szukaj aplikacji…"
           autocomplete="off" spellcheck="false" aria-label="Szukaj aplikacji">
    <kbd class="search-hint" aria-hidden="true">/</kbd>
  </div>

  <main class="grid" id="grid" role="list" aria-label="Aplikacje ekosystemu GREJEM"></main>

  <div class="empty-state" id="empty-state" hidden>
    <i data-lucide="search-x"></i>
    <p>Brak aplikacji pasujących do zapytania.</p>
  </div>

  <footer class="footer">
    <span>GREJEM INDUSTRIES © 2026</span>
    <span class="dot-sep">•</span>
    <span id="tile-count">0 aplikacji</span>
  </footer>

  <div class="toasts" id="toasts" aria-live="polite" aria-atomic="false"></div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/apps.js"></script>
  <script src="js/hub.js"></script>
</body>
</html>
